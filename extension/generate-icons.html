<!DOCTYPE html>
<html>
<head>
  <title>FlowLink Icon Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    .icon-container {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
    canvas {
      border: 1px solid #ccc;
      background: white;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 5px;
    }
    button:hover {
      background: #5568d3;
    }
  </style>
</head>
<body>
  <h1>FlowLink Extension Icons</h1>
  <p>Click the buttons below to download the icons:</p>
  
  <div class="icon-container">
    <div>
      <canvas id="icon16" width="16" height="16"></canvas>
      <br><button onclick="downloadIcon('icon16', 16)">Download 16x16</button>
    </div>
    <div>
      <canvas id="icon48" width="48" height="48"></canvas>
      <br><button onclick="downloadIcon('icon48', 48)">Download 48x48</button>
    </div>
    <div>
      <canvas id="icon128" width="128" height="128"></canvas>
      <br><button onclick="downloadIcon('icon128', 128)">Download 128x128</button>
    </div>
  </div>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      
      // Clear canvas
      ctx.clearRect(0, 0, size, size);
      
      // Create gradient background
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');
      
      // Draw rounded rectangle background
      const radius = size * 0.15;
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fill();
      
      // Draw connection symbol (two circles connected by lines)
      ctx.strokeStyle = 'white';
      ctx.fillStyle = 'white';
      ctx.lineWidth = size * 0.08;
      
      const circleRadius = size * 0.12;
      const centerX = size / 2;
      const centerY = size / 2;
      const offset = size * 0.25;
      
      // Left circle (device 1)
      ctx.beginPath();
      ctx.arc(centerX - offset, centerY - offset, circleRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Right circle (device 2)
      ctx.beginPath();
      ctx.arc(centerX + offset, centerY + offset, circleRadius, 0, Math.PI * 2);
      ctx.fill();
      
      // Connection lines
      ctx.beginPath();
      ctx.moveTo(centerX - offset + circleRadius, centerY - offset + circleRadius);
      ctx.lineTo(centerX + offset - circleRadius, centerY + offset - circleRadius);
      ctx.stroke();
      
      // Center node
      ctx.beginPath();
      ctx.arc(centerX, centerY, circleRadius * 0.7, 0, Math.PI * 2);
      ctx.fill();
    }

    function downloadIcon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Draw all icons on load
    window.onload = () => {
      drawIcon(document.getElementById('icon16'), 16);
      drawIcon(document.getElementById('icon48'), 48);
      drawIcon(document.getElementById('icon128'), 128);
    };
  </script>
</body>
</html>
