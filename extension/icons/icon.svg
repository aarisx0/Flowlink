<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect x="0" y="0" width="128" height="128" rx="20" fill="url(#grad)"/>
  
  <!-- Connection symbol -->
  <!-- Left circle (device 1) -->
  <circle cx="32" cy="32" r="15" fill="white"/>
  
  <!-- Right circle (device 2) -->
  <circle cx="96" cy="96" r="15" fill="white"/>
  
  <!-- Connection line -->
  <line x1="42" y1="42" x2="86" y2="86" stroke="white" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Center node -->
  <circle cx="64" cy="64" r="10" fill="white"/>
</svg>
